{% extends 'main.html' %}
{% block content %}

<style>
body{
    font-family: Cambria;
    margin:0;
    background-color:white;
    color:black;
}

.card{
    background:white;
    border:1px solid black;
}

.form-control{
    border:1px solid black;
    background:white;
    color:black;
}

.form-control::placeholder{
    color:#555;
}

.btn-custom{
    background:black;
    color:white;
    border:none;
}

.btn-custom:hover{
    background:#333;
}
</style>

<div class="row">

    <div class="col-md-3"></div>

    <div class="col-md-6">

        <center>
            <h1 style="color:black;">Diabetes Predictor</h1>
        </center>

        <div class="card card-body">

            <form class="form-horizontal" action="{{ url_for('predictPage') }}" method="POST">

                <div class="form-group">
                    <input class="form-control" type="number" name="Pregnancies" placeholder="No. of Pregnancies" required>
                </div>

                <div class="form-group">
                    <input class="form-control" type="number" step="any" name="Glucose" placeholder="Glucose" required>
                </div>

                <div class="form-group">
                    <input class="form-control" type="number" step="any" name="BloodPressure" placeholder="Blood Pressure (mmHg)" required>
                </div>

                <div class="form-group">
                    <input class="form-control" type="number" step="any" name="SkinThickness" placeholder="Skin Thickness (mm)" required>
                </div>

                <div class="form-group">
                    <input class="form-control" type="number" step="any" name="Insulin" placeholder="Insulin (µU/ml)" required>
                </div>

                <div class="form-group">
                    <input class="form-control" type="number" step="any" name="BMI" placeholder="BMI" required>
                </div>

                <div class="form-group">
                    <input class="form-control" type="number" step="any" name="DiabetesPedigreeFunction" placeholder="Diabetes Pedigree Function" required>
                </div>

                <div class="form-group">
                    <input class="form-control" type="number" name="Age" placeholder="Age (in years)" required>
                </div>

                <div class="form-group">
                    <input type="submit" class="btn btn-custom btn-block" value="Predict">
                </div>

            </form>

        </div>

    </div>

    <div class="col-md-3"></div>

</div>

{% endblock %}
